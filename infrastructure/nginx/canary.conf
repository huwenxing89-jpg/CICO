# 金丝雀部署 Nginx 配置
# 实现按权重分配流量到不同版本

# 稳定版 Upstream
upstream app_stable {
    least_conn;
    server 127.0.0.1:3000 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:3001 max_fails=3 fail_timeout=30s backup;
    keepalive 16;
}

# 金丝雀版本 Upstream
upstream app_canary {
    least_conn;
    server 127.0.0.1:3010 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:3011 max_fails=3 fail_timeout=30s backup;
    keepalive 16;
}

# 按用户 ID 进行分流（使用 consistent hash）
split_clients "${remote_addr}" $upstream_group {
    10%      "app_canary";  # 10% 流量到金丝雀版本
    *        "app_stable";   # 90% 流量到稳定版
}

# HTTPS 主配置（金丝雀模式）
server {
    listen 443 ssl http2;
    server_name app.example.com;

    # SSL 配置（与主配置相同）
    ssl_certificate /etc/letsencrypt/live/app.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # 日志（包含分流信息）
    access_log /var/log/nginx/app-canary-access.log;
    error_log /var/log/nginx/app-canary-error.log;

    # 健康检查端点（检查两个版本）
    location /api/health {
        proxy_pass http://app_stable;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
    }

    # 金丝雀版本健康检查
    location /api/health/canary {
        proxy_pass http://app_canary;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        add_header X-Canary-Version "true" always;
    }

    # 主应用（根据分流规则路由）
    location / {
        # 使用分流变量选择后端
        set $backend_upstream $upstream_group;

        # 管理员可以通过 cookie 强制使用金丝雀版本
        if ($http_cookie ~* "force_canary=true") {
            set $backend_upstream "app_canary";
        }

        # 内部测试用户使用金丝雀版本
        if ($remote_addr ~* "^10\.0\.0\.") {
            set $backend_upstream "app_canary";
        }

        # 执行代理
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;

        # WebSocket 支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 添加分流响应头
        add_header X-Served-By $backend_upstream always;
        add_header X-Canary-Status "active" always;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

# 监控端点（查看分流状态）
server {
    listen 8080;
    server_name localhost;

    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        deny all;
    }

    location /canary_status {
        default_type text/plain;
        return 200 "Canary Deployment Active\nStable: 90%\nCanary: 10%\n";
        access_log off;
        allow 127.0.0.1;
        deny all;
    }
}
